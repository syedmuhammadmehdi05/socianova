<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SociaNova — Feed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="feed-page">

  <nav class="topnav">
    <div class="nav-brand">
      <div class="logo-mark">SN</div>
      SociaNova
    </div>
    <div class="nav-center">
      <a href="feed.html" class="nav-link active">Feed</a>
      <a href="search.html" class="nav-link">Search</a>
    </div>
    <div class="nav-right">
      <span class="nav-user" id="nav-username"></span>
      <button class="btn-logout" id="btn-logout">Sign out</button>
    </div>
  </nav>

  <main class="feed-container">

    <section class="composer">
      <form id="composer-form">
        <div class="composer-top">
          <div class="composer-avatar" id="composer-avatar">?</div>
          <textarea id="post-content" placeholder="What's on your mind?" maxlength="280" rows="3"></textarea>
        </div>
        <div class="composer-bottom">
          <span id="char-count">280</span>
          <button class="btn-post" type="submit">Post</button>
        </div>
      </form>
    </section>

    <section id="feed"></section>

  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/feed.js"></script>

</body>

</html>
